name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.10
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest -q
      - name: Build
        run: uv build
      - name: Security audit
        run: uvx pip-audit
      - name: Safety check
        run: uvx safety check || true
      - name: Performance smoke
        run: uv run python scripts/perf_smoke.py
