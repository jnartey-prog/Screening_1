    assigned_to: R4
    inputs: ["specs/A2.md", "specs/A3.md", "specs/A4.md"]
    constraints: "Must include silhouette and gap-statistic support for k selection."
    expected_tests: ["TST-CLUSTER-001", "TST-CLUSTER-002"]
    required_tools: ["code_generator", "file_writer"]

  - task_id: A2.F-RISK.001
    title: Implement reduced-order resonance susceptibility score and labels
    assigned_to: R4
    inputs: ["specs/A2.md", "specs/A4.md"]
    constraints: "Use R(t)=V_dep*U_inc*C_inc/K(t) and deterministic threshold mapping."
    expected_tests: ["TST-RISK-001", "TST-RISK-002"]
    required_tools: ["code_generator", "file_writer"]

  - task_id: A2.F-MODEL.001
    title: Implement ordinal risk model training and inference
    assigned_to: R4
    inputs: ["specs/A2.md", "specs/A4.md"]
    constraints: "Cumulative-logit model must emit calibrated class probabilities."
    expected_tests: ["TST-MODEL-001", "TST-MODEL-002"]
    required_tools: ["code_generator", "file_writer"]

