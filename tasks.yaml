version: 1
tasks:
  - task_id: A2.F-INGEST.001
    title: Implement ingestion and preprocessing pipeline
    assigned_to: R4
    inputs: ["proposal.normalized.json", "specs/A2.md", "specs/A3.md", "specs/A4.md"]
    constraints: "Must enforce timestamp alignment, missing-data policy, MAD outlier checks, and per-unit normalization."
    expected_tests: ["TST-PROXY-002", "TST-PIPE-003"]
    required_tools: ["code_generator", "file_writer", "test_stub_creator"]

  - task_id: A2.F-PROXIES.001
    title: Implement physics-guided proxy computations
    assigned_to: R4
    inputs: ["specs/A2.md", "specs/A3.md", "specs/A4.md"]
    constraints: "Proxy formulas must follow methodological basis and log numeric safeguards."
    expected_tests: ["TST-PROXY-001"]
    required_tools: ["code_generator", "file_writer"]

  - task_id: A2.F-CLUSTER.001
